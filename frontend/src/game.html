<link rel="stylesheet" href="css/game.css">

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner">⚔</div>
  <div class="loading-text">LOADING...</div>
</div>
<div class="toast" id="toast"></div>

<div class="shell">

  <div class="top">
    <div class="sidebar">
      <div class="sb-title">— MENU —</div>
      <div class="sb-btn active" onclick="setStage('agents')"><span class="ico">⚔</span>PARTY</div>
      <div class="sb-btn" onclick="setStage('recap')"><span class="ico">📜</span>RECAP</div>
      <div class="sb-btn" onclick="setStage('lore')"><span class="ico">🗺</span>LORE</div>
      <div class="sb-btn" onclick="setStage('die')" id="dieBtn"><span class="ico">🎲</span>DIE ROLL</div>
      <div class="sb-btn" onclick="setStage('trace')"><span class="ico">📋</span>TRACE</div>
      <div class="sb-sep"></div>
      <div class="trace-box">
        <div class="trace-hd">▸ LIVE TRACE</div>
        <div class="trace-feed" id="traceFeed"></div>
      </div>
      <div class="sb-sep"></div>
      <div class="sb-hp" id="hpDisplay">
        HP --/--
        <div class="hp-bar"><div class="hp-fill" id="hpFill" style="width:0%"></div></div>
      </div>
    </div>

    <div class="stage" id="stage">
      <div class="turn-tag" id="turnTag"><span class="dot"></span><span id="turnText">LOADING...</span></div>

      <div class="agent-view" id="agentView"></div>

      <div class="die-view" id="dieView">
        <div class="die-label" id="dieLabel">D20 — CHECK</div>
        <div class="die-face" id="dieFace">
          <div class="die-number" id="dieNum">20</div>
        </div>
        <div class="die-hint" id="dieHint"></div>
        <div class="die-result-strip" id="dieResult"></div>
      </div>

      <div class="trace-full" id="traceFull">
        <div class="trace-full-hd" id="traceFullHd">◈ AGENT REASONING TRACE</div>
        <div class="trace-full-body" id="traceFullBody"></div>
      </div>

      <div class="content-view" id="recapView">
        <div class="cv-hd">📜 SESSION RECAP</div>
        <div class="cv-body" id="recapBody">
          Your adventure begins...
        </div>
      </div>

      <div class="content-view" id="loreView">
        <div class="cv-hd">🗺 WORLD LORE</div>
        <div class="cv-body" id="loreBody">
          The world awaits discovery.
        </div>
      </div>
    </div>
  </div>

  <div class="textbox" id="textbox">
    <div class="tb-bg"></div>
    <div class="role-accent warrior-acc" id="roleAccent"></div>

    <div class="portrait-side">
      <div class="portrait" id="portrait">
        <div class="sprite-container" id="portraitContainer">
          <svg width="72" height="86" viewBox="0 0 72 86" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;display:block;">
            <rect width="72" height="86" fill="#1a1008"/>
          </svg>
        </div>
        <div class="role-badge" id="roleBadge">--</div>
      </div>
    </div>

    <div class="text-side">
      <div class="dialogue">
        <div class="speaker" id="speakerName">GAME MASTER</div>
        <div class="narr-text" id="narrText">
          Loading adventure...<span class="cursor"></span>
        </div>
      </div>

      <div class="input-row">
        <input class="p-input" type="text" placeholder="> what do you do?" id="pInput">
        <button class="act-btn" onclick="sendAct()">ACT ▸</button>
      </div>
    </div>

  </div>

</div>

<script src="js/game-data.js"></script>
<script src="js/game-utils.js"></script>
<script src="js/game-ui.js"></script>
<script src="js/game.js"></script>
